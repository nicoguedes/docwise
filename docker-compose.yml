services:
  postgres:
    image: pgvector/pgvector:0.7.4-pg16
    environment:
      POSTGRES_USER: docwise
      POSTGRES_PASSWORD: docwise
      POSTGRES_DB: docwise
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docwise"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://docwise:docwise@postgres:5432/docwise?sslmode=disable
      OLLAMA_URL: http://ollama:11434
      EMBED_MODEL: nomic-embed-text
      CHAT_MODEL: llama3.1:8b
      CHUNK_SIZE: "1000"
      CHUNK_OVERLAP: "200"
      PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
  ollama_models:
  uploads:
